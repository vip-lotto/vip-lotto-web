<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Admin Login</title>

<style>

body{
font-family:Arial;
background:#f2f2f2;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.box{
background:white;
padding:30px;
border-radius:10px;
box-shadow:0 0 10px rgba(0,0,0,0.1);
width:300px;
text-align:center;
}

input{
width:100%;
padding:10px;
margin:8px 0;
}

button{
width:100%;
padding:10px;
background:#2d89ef;
color:white;
border:none;
cursor:pointer;
}

button:hover{
background:#1b5fbf;
}

</style>

</head>

<body>

<div class="box">

<h2>Admin Login</h2>

<input id="user" placeholder="Username">
<input id="pass" type="password" placeholder="Password">

<button onclick="login()">Login</button>

</div>

<script>

async function login(){

const user = document.getElementById("user").value
const pass = document.getElementById("pass").value

const res = await fetch("/api/login",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({user,pass})
})

const data = await res.json()

if(data.status==="ok"){
location.href="/admin.html"
}else{
alert("Login fail")
}

}

</script>

</body>
</html>
